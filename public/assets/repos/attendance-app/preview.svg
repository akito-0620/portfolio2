<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#faf9f7"/>

  <!-- Phone drop shadow -->
  <rect x="301" y="37" width="198" height="380" rx="27" fill="#1a1a18" opacity="0.08"/>

  <!-- Phone body -->
  <rect x="298" y="33" width="204" height="382" rx="28" fill="#1a1a18"/>

  <!-- Screen -->
  <rect x="308" y="52" width="184" height="344" rx="16" fill="#f8f8f6"/>

  <!-- Camera notch -->
  <rect x="366" y="57" width="68" height="14" rx="7" fill="#1a1a18"/>

  <!-- App header bar -->
  <rect x="308" y="71" width="184" height="38" fill="#1a1a18"/>
  <text x="400" y="95" text-anchor="middle" fill="#ffffff" font-family="system-ui,Arial,sans-serif" font-size="14" font-weight="600">出席管理</text>

  <!-- Date pill -->
  <rect x="318" y="116" width="164" height="20" rx="10" fill="#ede8df"/>
  <text x="400" y="130" text-anchor="middle" fill="#6b6b63" font-family="system-ui,Arial,sans-serif" font-size="10">2026年6月14日（木）</text>

  <!-- Column headers -->
  <text x="320" y="152" fill="#6b6b63" font-family="system-ui,Arial,sans-serif" font-size="9.5" letter-spacing="0.04em">学生</text>
  <text x="480" y="152" text-anchor="end" fill="#6b6b63" font-family="system-ui,Arial,sans-serif" font-size="9.5">状態</text>
  <line x1="318" y1="156" x2="486" y2="156" stroke="#e8e4dc" stroke-width="0.75"/>

  <!-- Row 1 -->
  <rect x="308" y="156" width="184" height="38" fill="white"/>
  <circle cx="328" cy="175" r="10" fill="#e8f5e9"/>
  <text x="328" y="180" text-anchor="middle" fill="#43a047" font-family="system-ui,Arial,sans-serif" font-size="13" font-weight="700">✓</text>
  <text x="344" y="172" fill="#1a1a18" font-family="system-ui,Arial,sans-serif" font-size="11.5" font-weight="500">田中 太郎</text>
  <rect x="448" y="165" width="36" height="18" rx="9" fill="#e8f5e9"/>
  <text x="466" y="178" text-anchor="middle" fill="#43a047" font-family="system-ui,Arial,sans-serif" font-size="9" font-weight="600">出席</text>
  <line x1="318" y1="194" x2="486" y2="194" stroke="#e8e4dc" stroke-width="0.5"/>

  <!-- Row 2 -->
  <rect x="308" y="194" width="184" height="38" fill="white"/>
  <circle cx="328" cy="213" r="10" fill="#fff8e1"/>
  <text x="328" y="218" text-anchor="middle" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="12" font-weight="700">!</text>
  <text x="344" y="210" fill="#1a1a18" font-family="system-ui,Arial,sans-serif" font-size="11.5" font-weight="500">佐藤 花子</text>
  <rect x="448" y="203" width="36" height="18" rx="9" fill="#fff8e1"/>
  <text x="466" y="216" text-anchor="middle" fill="#f59e0b" font-family="system-ui,Arial,sans-serif" font-size="9" font-weight="600">遅刻</text>
  <line x1="318" y1="232" x2="486" y2="232" stroke="#e8e4dc" stroke-width="0.5"/>

  <!-- Row 3 -->
  <rect x="308" y="232" width="184" height="38" fill="white"/>
  <circle cx="328" cy="251" r="10" fill="#ffebee"/>
  <text x="328" y="257" text-anchor="middle" fill="#e53935" font-family="system-ui,Arial,sans-serif" font-size="13" font-weight="700">✕</text>
  <text x="344" y="248" fill="#1a1a18" font-family="system-ui,Arial,sans-serif" font-size="11.5" font-weight="500">鈴木 一郎</text>
  <rect x="448" y="241" width="36" height="18" rx="9" fill="#ffebee"/>
  <text x="466" y="254" text-anchor="middle" fill="#e53935" font-family="system-ui,Arial,sans-serif" font-size="9" font-weight="600">欠席</text>
  <line x1="318" y1="270" x2="486" y2="270" stroke="#e8e4dc" stroke-width="0.5"/>

  <!-- Row 4 -->
  <rect x="308" y="270" width="184" height="38" fill="white"/>
  <circle cx="328" cy="289" r="10" fill="#e8f5e9"/>
  <text x="328" y="294" text-anchor="middle" fill="#43a047" font-family="system-ui,Arial,sans-serif" font-size="13" font-weight="700">✓</text>
  <text x="344" y="286" fill="#1a1a18" font-family="system-ui,Arial,sans-serif" font-size="11.5" font-weight="500">山田 美咲</text>
  <rect x="448" y="279" width="36" height="18" rx="9" fill="#e8f5e9"/>
  <text x="466" y="292" text-anchor="middle" fill="#43a047" font-family="system-ui,Arial,sans-serif" font-size="9" font-weight="600">出席</text>
  <line x1="318" y1="308" x2="486" y2="308" stroke="#e8e4dc" stroke-width="0.5"/>

  <!-- Row 5 -->
  <rect x="308" y="308" width="184" height="38" fill="white"/>
  <circle cx="328" cy="327" r="10" fill="#e8f5e9"/>
  <text x="328" y="332" text-anchor="middle" fill="#43a047" font-family="system-ui,Arial,sans-serif" font-size="13" font-weight="700">✓</text>
  <text x="344" y="324" fill="#1a1a18" font-family="system-ui,Arial,sans-serif" font-size="11.5" font-weight="500">伊藤 健太</text>
  <rect x="448" y="317" width="36" height="18" rx="9" fill="#e8f5e9"/>
  <text x="466" y="330" text-anchor="middle" fill="#43a047" font-family="system-ui,Arial,sans-serif" font-size="9" font-weight="600">出席</text>

  <!-- Bottom section -->
  <rect x="308" y="346" width="184" height="50" fill="#faf9f7"/>

  <!-- Summary dots -->
  <circle cx="322" cy="360" r="4" fill="#43a047"/>
  <text x="331" y="364" fill="#1a1a18" font-family="system-ui,Arial,sans-serif" font-size="9.5">出席 3</text>
  <circle cx="367" cy="360" r="4" fill="#f59e0b"/>
  <text x="376" y="364" fill="#1a1a18" font-family="system-ui,Arial,sans-serif" font-size="9.5">遅刻 1</text>
  <circle cx="413" cy="360" r="4" fill="#e53935"/>
  <text x="422" y="364" fill="#1a1a18" font-family="system-ui,Arial,sans-serif" font-size="9.5">欠席 1</text>

  <!-- Save button -->
  <rect x="318" y="370" width="164" height="22" rx="11" fill="#1a1a18"/>
  <text x="400" y="385" text-anchor="middle" fill="white" font-family="system-ui,Arial,sans-serif" font-size="11" font-weight="600">保存する</text>

  <!-- Home indicator -->
  <rect x="371" y="396" width="58" height="3" rx="1.5" fill="#1a1a18" opacity="0.2"/>
</svg>
